title: Frieve - Audio Review
description: Beyond Story, Beyond Brand. The Truth in Silence.
url: "https://audioreview.frieve.com"
baseurl: ""
logo: /assets/images/og-image.png

# Multi-language settings
languages: ["en", "ja"]
default_lang: "en"

collections:
  companies:
    output: true
  products:
    output: true

defaults:
  - scope:
      path: ""
      type: "companies"
    values:
      layout: "company"
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"

# Disable github-pages default theme (jekyll-theme-primer) which ships
# assets/css/style.scss and conflicts with this site's assets/css/style.css.
# On incremental rebuilds, primer's SCSS overwrites our static CSS, breaking
# styles in the browser until a full rebuild.
theme: null

plugins:
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# AudioSpecs widget
audiospecs_base_url: "https://audiospecs.frieve.com"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - dev
  - sessions
  - tools
  - lambda
